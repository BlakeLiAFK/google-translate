name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'

      - name: Build macOS arm64
        run: task darwin:build ARCH=arm64
        env:
          CGO_ENABLED: '1'

      - name: Package macOS .app
        run: task darwin:create:app:bundle

      - name: Create ZIP
        run: |
          cd bin
          zip -r google-translate-macos-arm64.zip google-translate.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-translate-macos-arm64
          path: bin/google-translate-macos-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'

      - name: Build Windows amd64
        run: task windows:build
        env:
          CGO_ENABLED: '0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-translate-windows-amd64
          path: bin/google-translate.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'

      - name: Build Linux amd64
        run: task linux:build
        env:
          CGO_ENABLED: '1'

      - name: Compress binary
        run: |
          cd bin
          tar czf google-translate-linux-amd64.tar.gz google-translate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-translate-linux-amd64
          path: bin/google-translate-linux-amd64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/google-translate-macos-arm64/google-translate-macos-arm64.zip
            artifacts/google-translate-windows-amd64/google-translate.exe
            artifacts/google-translate-linux-amd64/google-translate-linux-amd64.tar.gz
